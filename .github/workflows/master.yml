name: Deploy to FichaRPG

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '6.x.x'
    
    - name: Restore dependencies
      run: dotnet restore ./FichaRPG/FichaRPG.sln
    
    - name: Build
      run: dotnet build ./FichaRPG/FichaRPG.sln -c Release --no-restore
    
    - name: Publish
      run: dotnet publish ./FichaRPG/FichaRPG.sln -c Release --no-build -o ./publish
    
    - name: Deploy to FichaRPG
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      env:
        AZURE_SUBSCRIPTION_ID: ${{secrets.AZURE_SUBSCRIPTION_ID}}
        AZURE_RESOURCE_GROUP: ${{secrets.AZURE_RESOURCE_GROUP_NAME}} 
        AZURE_VNET_NAME: ${{secrets.AZURE_VNET_NAME}}
        AZURE_SUBNET_NAME: ${{secrets.AZURE_SUBNET_NAME}}
      with:
          username: ${{secrets.VM_USERNAME}}
          host: ${{secrets.VM_HOST}}
          key: ${{secrets.SSH_PRIVATE_KEY }} 
          password: ${{secrets.VM_PASSWORD}}
          local_path: './publish'
          remote_path: '/home/capitao-tchaka/Release/net6.0'
          port: 22
    
    - name: Restart service
      uses: appleboy/ssh-action@master
      with:
        host: ${{secrets.VM_HOST}}
        username: ${{secrets.VM_USERNAME}}
        password: ${{secrets.VM_PASSWORD}}
        script: |
          echo "${{ secrets.VM_PASSWORD }}" | sudo -S systemctl restart ficha-rpg.service
      env:
        VM_PASSWORD: ${{ secrets.VM_PASSWORD }}
        AZURE_SUBSCRIPTION_ID: ${{secrets.AZURE_SUBSCRIPTION_ID}}
        AZURE_RESOURCE_GROUP: ${{secrets.AZURE_RESOURCE_GROUP_NAME}} 
        AZURE_VNET_NAME: ${{secrets.AZURE_VNET_NAME}}
        AZURE_SUBNET_NAME: ${{secrets.AZURE_SUBNET_NAME}}
